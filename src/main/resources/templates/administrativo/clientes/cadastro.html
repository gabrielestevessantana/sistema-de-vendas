<!DOCTYPE html>
<html xmlns:th="https://thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastro Cliente</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid"
         style="color: white; background-color: rgb(57, 205, 54);">

        <img src="https://png.pngtree.com/png-vector/20220113/ourmid/pngtree-design-concept-of-a-winged-letter-w-logo-vector-png-image_34978768.png"
             width="30" height="24">

        <a class="navbar-brand text-white" href="#">Winners</a>
    </div>
</nav>

<div class="container mt-4">

    <form action="/salvarCliente" th:object="${cliente}" method="POST">

        <div class="form-group">

			<div class="row">
				<div class ="col -md">
					<label>ID</label>
            		<input type="text" readonly class="form-control" th:field="*{id}">
				</div>
				
				<div class ="col -md">
					<label>Nome cliente</label>
           		    <input type="text" required class="form-control" th:field="*{nome}">
				</div>
				
				<div class ="col -md">
				    <label>CPF</label>
           			<input type="text" id="cpf" required class="form-control" th:field="*{cpf}">
				</div>
				
			</div>
			
			<div class="row">
				<div class ="col -md">
					<label>Telefone</label>
           		    <input type="text" id="telefone" required class="form-control" th:field="*{telefone}">
				</div>
				
				<div class ="col -md">
					<label>Endereco</label>
            		<input type="text" required class="form-control" th:field="*{endereco}">
				</div>
				
				<div class ="col -md">
          		  <label>Numero</label>
          		  <input type="text" required class="form-control" th:field="*{numero}">
				</div>
				
			</div>
            
            <div class="row">
				<div class ="col -md">
					<label>Bairro</label>
           		    <input type="text" required class="form-control" th:field="*{bairro}">
          
				</div>
				
				<div class ="col -md">
				   <label>Email</label>
           		   <input type="text" required class="form-control" th:field="*{email}">
				</div>
				
			</div>
			
			<div class ="col -md">
				  <label> idade</label>
            	  <select th:field="*{cidade}" class="form-control">
                  <option th:each="est : ${listaCidades}"
                        th:value="${est.id}"
                        th:text="${est.nome}">
                  </option>
            </select>
			</div>

        </div>

        <br>

        <button type="submit" class="btn btn-success">Salvar</button>

        <a class="btn btn-danger" href="/administrativo">Voltar</a>
        <a class="btn btn-primary" href="/listarCliente">Listar</a>

    </form>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>
    $(document).ready(function () {
        $('#cpf').mask('999.999.999-99');
        $('#telefone').mask('(99) 9 9999-9999');

    });
</script>

</body>
</html>
